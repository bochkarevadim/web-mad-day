<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MAD DAY — регистрация</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        background: radial-gradient(circle at top, #1f1f1f, #0b0b0b);
        color: #f5f5f5;
      }
      .header {
        padding: 24px 16px 8px;
        text-align: center;
      }
      .header h1 {
        margin: 0 0 8px;
        font-size: 24px;
        letter-spacing: 0.4px;
      }
      .header p {
        margin: 0;
        color: #cfcfcf;
      }
      .frame-wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 16px;
      }
      iframe {
        width: 100%;
        height: 1200px;
        border: none;
        border-radius: 16px;
        background: #111;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }
      .fallback {
        text-align: center;
        padding: 12px 16px 32px;
      }
      .fallback a {
        color: #f39c12;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <h1>Регистрация MAD DAY</h1>
      <p>Если форма не отображается, открой её по ссылке ниже.</p>
    </header>
    <main class="frame-wrap">
      <iframe
        src="RENDER_FORM_URL"
        title="Регистрация без Telegram"
        loading="lazy"
      ></iframe>
    </main>
    <div class="fallback">
      <a href="RENDER_FORM_URL" target="_blank" rel="noopener">Открыть форму в новом окне</a>
    </div>
  </body>
</html>
